services:
  db:
    image: postgres
    restart: always

    ports:
      - 5432:5432

    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartAssistantDb

  mcp-server:
    build:
      context: ../
    ports:
      - 8000:8000
    depends_on:
      - db
